# nginx конфиг для FinAssist Mini App
# Расположение на сервере: /etc/nginx/sites-available/finassist
# Активировать: sudo ln -s /etc/nginx/sites-available/finassist /etc/nginx/sites-enabled/
#
# Заменить app.example.com на реальный домен.
# Пути к сертификатам появятся после: sudo certbot --nginx -d app.example.com
#
# Архитектура:
#   nginx (443/80) → статика из /var/www/finassist-webapp/
#                 → /api/* проксируется на Node :8080 (WEBAPP_PORT)
#   Node :8080    → бот (long polling) + HTTP API + webhook'и платёжек

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    # Certbot использует этот location для challenge при выпуске/обновлении сертификата.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной server-блок
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.example.com;

    # ── TLS (Let's Encrypt через certbot --nginx) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;

    # Современные параметры TLS (certbot добавит их автоматически, но явно лучше).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Базовые параметры ─────────────────────────────────────────────────
    # Максимальный размер тела запроса. Webhook-уведомления Prodamus/Robokassa
    # приходят как urlencoded — они небольшие. Загрузка файлов идёт через бота
    # (Telegram), не через HTTP-сервер, поэтому 1m достаточно.
    client_max_body_size 1m;

    # Таймауты проксирования (Node может тормозить при AI-запросах к Anthropic).
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Статика Mini App ──────────────────────────────────────────────────
    # Содержимое src/app/webapp/dist/ копируется сюда при деплое (rsync).
    root /var/www/finassist-webapp;
    index index.html;

    # Хешированные ассеты Vite: /assets/index-abc123.js → кешируем год, immutable.
    # Vite включает хеш в имя файла → при изменении имя меняется → нет проблем с кешем.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # index.html — no-cache: браузер всегда делает условный запрос (ETag/Last-Modified).
    # Это гарантирует, что после деплоя клиент получит свежий HTML с новыми хешами.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # ── API: проксирование на Node :8080 ─────────────────────────────────
    # Покрывает: /api/health, /api/webapp/*, /api/analytics/*,
    #            /api/webhooks/robokassa, /api/webhooks/prodamus
    location /api/ {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;

        # Передаём реальный IP клиента в Node (нужно для логирования).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Отключаем буферизацию для webhook'ов с немедленным ответом.
        proxy_buffering off;

        # WebSocket (на будущее — SSE/WS в Mini App).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    # Любой путь (кроме /api/ и /assets/), который не является файлом,
    # отдаёт index.html — React Router / HashRouter сам разберётся с маршрутом.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Security headers ──────────────────────────────────────────────────
    # Обязательны для Telegram Web App (CSP позволяет загрузку из telegram.org).
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Логи ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/finassist_access.log;
    error_log  /var/log/nginx/finassist_error.log;
}
